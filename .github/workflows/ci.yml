name: CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-cmd: npm run build:mac
            artifact-pattern: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            build-cmd: npm run build:win
            artifact-pattern: |
              release/*-setup.exe
              release/*-portable.exe
              release/*.zip
          - os: ubuntu-latest
            build-cmd: npm run build:linux
            artifact-pattern: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Linux: install native module build deps and electron runtime deps
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxkbfile-dev

      # Windows: ensure native module toolchain
      - name: Install Windows build tools
        if: runner.os == 'Windows'
        run: npm install --global windows-build-tools@5.2.2 || true
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Patch macOS signing for CI
        if: runner.os == 'macOS'
        run: |
          node -e "
            const fs = require('fs');
            let yml = fs.readFileSync('electron-builder.yml', 'utf8');
            yml = yml.replace(/hardenedRuntime:\s*true/, 'hardenedRuntime: false');
            yml = yml.replace(/^\s*entitlements:.*$/gm, '');
            yml = yml.replace(/^\s*entitlementsInherit:.*$/gm, '');
            fs.writeFileSync('electron-builder.yml', yml);
            console.log('Patched electron-builder.yml for CI signing');
          "

      # Code signing: disabled by default. To enable:
      #   macOS: set CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD
      #   Windows: set WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD
      - name: Build
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: ${{ matrix.artifact-pattern }}
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true


      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: '**/*'
          draft: true
          generate_release_notes: true
